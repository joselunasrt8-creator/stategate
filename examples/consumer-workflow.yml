name: StateGate Consumer Verification

on:
  workflow_dispatch:

jobs:
  exact-pin-valid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run exact pin VALID case
        id: stategate
        uses: joselunasrt8-creator/stategate@v1.0.0
        with:
          repo: owner/repo
          pr-number: '1'
          head-sha: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          base-sha: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          actor: human-user
          pr-diff: |
            diff --git a/README.md b/README.md
            index 1111111..2222222 100644
            --- a/README.md
            +++ b/README.md
            @@ -1 +1 @@
            -old
            +new
      - uses: actions/upload-artifact@v4
        with:
          name: exact-pin-valid-proof
          path: MERGE_GUARD_PROOF.json

  major-pin-null:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run major pin NULL case
        id: stategate
        continue-on-error: true
        uses: joselunasrt8-creator/stategate@v1
        with:
          repo: owner/repo
          pr-number: '2'
          head-sha: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          base-sha: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          actor: human-user
          pr-diff: ''
      - uses: actions/upload-artifact@v4
        with:
          name: major-pin-null-proof
          path: MERGE_GUARD_PROOF.json
      - name: Document outputs
        run: |
          echo "result=${{ steps.stategate.outputs.result }}"
          echo "proof_id=${{ steps.stategate.outputs.proof_id }}"
          echo "proof_hash=${{ steps.stategate.outputs.proof_hash }}"
          echo "diff_hash=${{ steps.stategate.outputs.diff_hash }}"
          echo "null_reasons=${{ steps.stategate.outputs.null_reasons }}"
